<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Christian Response</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./ui/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Alerts CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notiflix@3.2.7/dist/notiflix-3.2.7.min.css" />
</head>

<body class="bg-dark text-light d-flex flex-column vh-100">
  <div class="container d-flex flex-column h-100 py-3">
    <h1 class="mb-3 text-center">AI Christian Response</h1>

    <!-- Chat Box -->
    <div class="chat-container flex-grow-1 mb-3 d-flex flex-column">
      <div class="chat-box flex-grow-1" id="chat-box"></div>
    </div>



    <!-- Input Bar -->
    <form id="chat-form" class="mt-auto">
      <textarea id="user-input" placeholder="Type your message..." rows="1" required></textarea>
      <button type="submit" id="send-btn">
        <!-- Paper plane icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 16 16">
          <path
            d="M15.854.146a.5.5 0 0 1 .11.54l-5.5 14a.5.5 0 0 1-.917.033L7.69 9.56l-4.857-1.86a.5.5 0 0 1-.033-.917l14-5.5a.5.5 0 0 1 .54.11zM6.832 8.727l2.478 4.782 4.29-10.91-10.91 4.29 4.142 1.838z" />
        </svg>
        <div id="loading-spinner" class="spinner-border spinner-border-sm text-primary" role="status"></div>
      </button>
    </form>

    <div class="form-check form-switch mt-2">
      <input class="form-check-input" type="checkbox" id="theme-toggle" />
      <label class="form-check-label" for="theme-toggle">Light Theme</label>
    </div>
  </div>

  <script type="module" src="main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/notiflix@3.2.7/dist/notiflix-3.2.7.min.js"></script>
</body>

</html>
