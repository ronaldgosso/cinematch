<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christian Text Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./ui/style.css">
</head>
<body class="bg-dark text-light d-flex flex-column vh-100">
 
<div class="container d-flex flex-column h-100 py-3">
  <h1 class="mb-3 text-center">Christian Text Generator</h1>

  <!-- Chat Box -->
  <div class="chat-container flex-grow-1 mb-3 d-flex flex-column">
    <div class="chat-box flex-grow-1 overflow-auto" id="chat-box">
      
    </div>
  </div>

  <!-- Input Bar -->
  <form id="chat-form" class="d-flex mt-auto">
    <input type="text" id="user-input" class="form-control rounded-pill me-2" placeholder="Type your message..." required>
    <button type="submit" class="btn btn-primary rounded-pill">Send</button>
  </form>

  <div class="form-check form-switch mt-2">
    <input class="form-check-input" type="checkbox" id="theme-toggle">
    <label class="form-check-label" for="theme-toggle">Light Theme</label>
  </div>
</div> 

<script src="main.js"></script>
</body>
</html>
